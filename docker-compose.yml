services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GOOGLE_PLACES_API_KEY: ${NEXT_PUBLIC_GOOGLE_PLACES_API_KEY}
        NEXT_PUBLIC_URL_PEDIR: ${NEXT_PUBLIC_URL_PEDIR}
        NEXT_PUBLIC_URL_REVENDA: ${NEXT_PUBLIC_URL_REVENDA}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASS: ${ADMIN_PASS}
      JWT_SECRET: ${JWT_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      NEXT_PUBLIC_GOOGLE_PLACES_API_KEY: ${NEXT_PUBLIC_GOOGLE_PLACES_API_KEY}
      NEXT_PUBLIC_URL_PEDIR: ${NEXT_PUBLIC_URL_PEDIR}
      NEXT_PUBLIC_URL_REVENDA: ${NEXT_PUBLIC_URL_REVENDA}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
